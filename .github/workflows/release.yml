name: Release Simple CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Read version from 1.0.md
        id: get_version
        run: |
          VERSION=$(grep -i "^Version:" 1.0.md | head -n1 | cut -d':' -f2 | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Read 1.0.md changelog
        id: read_changelog
        run: |
          cat 1.0.md >> $GITHUB_STEP_SUMMARY

      - name: Run basic test
        run: |
          echo 'say "Hello from Simple!"' > /tmp/test.spml
          node bin/simple.js run /tmp/test.spml

      - name: Package with pkg
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --out-path dist-binaries

      - name: List built binaries
        run: ls -la dist-binaries/

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: simple-win-x64
          path: dist-binaries/simple.exe

      - name: Create Linux release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: 'Simple v${{ steps.get_version.outputs.VERSION }}'
          draft: false
          prerelease: false
          files: |
            dist-binaries/simple.exe
        body: |
          # Simple v${{ steps.get_version.outputs.VERSION }}

          A beginner-friendly programming language with natural English syntax.

          ## Download & Install

          ### Windows
          Download `simple.exe` and put it anywhere in your PATH. Double-click to launch!

          ## What's Included
          
          - Windows binary (no Node.js required!)
          - Source archive with all examples

          See 1.0.md for full changelog.

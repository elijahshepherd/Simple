name: Release Simple CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Find latest version file
        id: find_version
        run: |
          # Find the latest version file in docs/release/
          VERSION_FILE=$(ls -t docs/release/*.md | head -n1)
          echo "VERSION_FILE=$VERSION_FILE" >> $GITHUB_OUTPUT
          
          # Extract version from filename (e.g., docs/release/1.0.md -> 1.0)
          VERSION=$(basename "$VERSION_FILE" .md)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Read version file
        id: read_version_file
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat "${{ steps.find_version.outputs.VERSION_FILE }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract version number from content
        id: extract_version
        run: |
          VERSION=$(grep -i "^Version:" "${{ steps.find_version.outputs.VERSION_FILE }}" | head -n1 | cut -d':' -f2 | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Run basic test
        run: |
          echo 'say "Hello from Simple!"' > /tmp/test.spml
          node bin/simple.js run /tmp/test.spml

      - name: Package with pkg (Windows only)
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --out-path dist-binaries

      - name: List built binaries
        run: ls -la dist-binaries/

- name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: simple-win-x64
          path: dist-binaries/simple.exe

      - name: Extract tag name
        id: tag_name
        run: |
          # Extract just the tag name from refs/tags/v1.0 -> v1.0
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            dist-binaries/simple.exe
          body: |
            ${{ steps.read_version_file.outputs.content }}

name: Release Simple CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Find version file for tag
        id: find_version
        run: |
          # Extract version from tag (e.g., v1.5.0 -> 1.5.0)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          VERSION_FILE="docs/release/${TAG_VERSION}.md"
          
          if [ ! -f "$VERSION_FILE" ]; then
            echo "ERROR: Version file $VERSION_FILE not found!"
            echo "Please create docs/release/${TAG_VERSION}.md before tagging."
            exit 1
          fi
          
          echo "VERSION_FILE=$VERSION_FILE" >> $GITHUB_OUTPUT
          echo "VERSION=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Read version file content
        id: read_version_file
        run: |
          # Use a delimiter that definitely won't appear in markdown content
          DELIMITER="___SIMPLE_RELEASE_CONTENT_BOUNDARY_$(date +%s%N)___"
          
          echo "content<<${DELIMITER}" >> $GITHUB_OUTPUT
          cat "${{ steps.find_version.outputs.VERSION_FILE }}" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Run basic test
        run: |
          echo 'say "Hello from Simple!"' > /tmp/test.spml
          node bin/simple.js run /tmp/test.spml

      - name: Package Windows executable with pkg
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --out-path dist-binaries

      - name: List built binaries
        run: ls -la dist-binaries/

      - name: Upload Windows binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-win-x64
          path: dist-binaries/simple.exe

      - name: Extract tag name
        id: tag_name
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.TAG_NAME }}
          name: ${{ steps.tag_name.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            dist-binaries/simple.exe
          body: ${{ steps.read_version_file.outputs.content }}

            ---
            **Download:** [simple.exe](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag_name.outputs.TAG_NAME }}/simple.exe)

            **Installation:**
            1. Download `simple.exe` from the assets below
            2. Run `simple.exe` - it will show a welcome screen and offer to install
            3. After installation, open a **new terminal** and run `simple run-example hello`

            **Built-in Examples:**
            - `simple run-example hello` - Hello world with colors
            - `simple run-example calculator` - Interactive calculator
            - `simple run-example functions` - Functions and recursion
            - `simple run-example lists` - List operations
            - `simple run-example loops` - Various loop types
            - `simple run-example conditions` - If/else conditions
            - `simple examples` - List all examples

name: Release Simple CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (optional)'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.tag }}" != "" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(date +'%Y.%m.%d')
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run basic test
        run: |
          echo 'say "Hello from Simple!"' > /tmp/test.spml
          node bin/simple.js run /tmp/test.spml

      - name: Package with pkg
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64,node18-linux-x64,node18-macos-x64 --out-path dist-binaries

      - name: List built binaries
        run: ls -la dist-binaries/

      - name: Create Source Archive
        run: |
          mkdir -p release
          cp -r examples dist release/
          cp bin/simple.js README.md PLAN.md package.json package-lock.json tsconfig.json release/
          cp -r src release/
          cp .github release/ -R 2>/dev/null || true
          cd release
          cd ..
          tar -czf simple-${{ steps.get_version.outputs.VERSION }}-source.tar.gz -C release .

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: simple-linux-x64
          path: dist-binaries/simple-linux

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: simple-macos-x64
          path: dist-binaries/simple-macos

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: simple-win-x64
          path: dist-binaries/simple.exe

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: simple-source
          path: simple-${{ steps.get_version.outputs.VERSION }}-source.tar.gz

      - name: Create Linux release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: 'Simple  v${{ steps.get_version.outputs.VERSION }}'
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist-binaries/simple-linux
            dist-binaries/simple-macos
            dist-binaries/simple.exe
            simple-${{ steps.get_version.outputs.VERSION }}-source.tar.gz
          body: |
            # Simple  v${{ steps.get_version.outputs.VERSION }}

            A beginner-friendly programming language with natural English syntax.

            ## Download & Install

            ### Windows
            Download `simple.exe` and put it anywhere in your PATH. Double-click to launch!

            ### macOS / Linux
            Download `simple-linux` or `simple-macos`, rename to `simple`, make executable (`chmod +x simple`), and put it in your PATH.

            ## Quick Start

            ```bash
            # Run an example
            ./simple run examples/hello.spml

            # Create a new project
            ./simple new myproject

            # List examples
            ./simple examples

            # Show help
            ./simple --help
            ```

            ## What's Included

            - Windows, macOS, and Linux binaries (no Node.js required!)
            - Source archive with all examples
            - All 8 stdlib modules: console, files, folders, system, random, time, text, math
            - 15+ working examples in `examples/`

            ## Documentation

            See README.md and PLAN.md in the source archive for full documentation.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.6.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            artifact_name: simple-windows-x64.exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: simple-linux-x64
          - os: macos-latest
            platform: macos
            arch: x64
            artifact_name: simple-macos-x64
          - os: macos-latest
            platform: macos
            arch: arm64
            artifact_name: simple-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npx tsc

      - name: Create executable with pkg
        run: |
          npm install -g pkg
          pkg dist/index.js --targets node20-${{ matrix.platform }}-${{ matrix.arch }} --output ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Simple ${{ github.ref_name }}
          body_path: docs/release/${{ github.ref_name }}.md
          files: |
            artifacts/simple-windows-x64.exe
            artifacts/simple-linux-x64
            artifacts/simple-macos-x64
            artifacts/simple-macos-arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-install-site:
    name: Update Installation Site
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
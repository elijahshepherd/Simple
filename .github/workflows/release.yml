name: Release Simple

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Find version file for tag
        id: find_version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          VERSION_FILE="docs/release/${TAG_VERSION}.md"
          
          if [ ! -f "$VERSION_FILE" ]; then
            echo "ERROR: Version file $VERSION_FILE not found!"
            echo "Please create docs/release/${TAG_VERSION}.md before tagging."
            exit 1
          fi
          
          echo "VERSION_FILE=$VERSION_FILE" >> $GITHUB_OUTPUT
          echo "VERSION=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Read version file content
        id: read_version_file
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('${{ steps.find_version.outputs.VERSION_FILE }}', 'utf8');
            const delimiter = 'SIMPLE_RELEASE_' + Date.now() + '_' + Math.random().toString(36).substring(2, 18);
            console.log('body<<' + delimiter);
            console.log(content);
            console.log(delimiter);
          " >> $GITHUB_OUTPUT

      - name: Build Windows executable with pkg
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --output simple.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            simple.exe
          body: ${{ steps.read_version_file.outputs.body }}
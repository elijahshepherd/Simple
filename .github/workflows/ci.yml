name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify build succeeded
        run: |
          # Check that the expected built files exist
          test -f dist/index.js
          test -f dist/lexer.js
          test -f dist/parser.js
          test -f dist/interpreter.js
          echo "All built files exist"

      - name: Test with examples
        run: |
          # Test that the CLI works with simple example programs
          node bin/simple.js run examples/hello.spml
          echo "---"
          node bin/simple.js run examples/counter.spml

      - name: Verify CLI commands
        run: |
          # Verify basic CLI commands work
          node bin/simple.js --version
          node bin/simple.js examples

      - name: Test pkg build (Windows)
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --output simple.exe
          test -f simple.exe
          echo "pkg build successful"

  build-windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Test on Windows
        shell: pwsh
        run: |
          node bin/simple.js run examples/hello.spml

      - name: Test pkg build on Windows
        shell: pwsh
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --output simple.exe
          test -f simple.exe
          ./simple.exe --version
          echo "Windows pkg build successful"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build

  test-language:
    name: Test Language
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npx tsc

      - name: Run example programs
        run: |
          node bin/simple.js run-example hello
          node bin/simple.js run-example calculator
          node bin/simple.js run-example functions
          node bin/simple.js run-example lists
          node bin/simple.js run-example loops
          node bin/simple.js run-example conditions
          node bin/simple.js run-example random
          node bin/simple.js run-example counter
          node bin/simple.js run-example guess_number
          node bin/simple.js run-example login
          node bin/simple.js run-example file_creator
          node bin/simple.js run-example write_file
          node bin/simple.js run-example read_file
          node bin/simple.js run-example todo
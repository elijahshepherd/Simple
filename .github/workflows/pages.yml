name: Deploy Changelog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package Windows executable with pkg
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --out-path dist-binaries

      - name: Generate changelog site
        run: |
          mkdir -p public
          
          # Read all version files and create the site
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            const releaseDir = 'docs/release';
            const files = fs.readdirSync(releaseDir)
              .filter(f => f.endsWith('.md'))
              .sort((a, b) => {
                const va = a.replace('.md', '').split('.').map(Number);
                const vb = b.replace('.md', '').split('.').map(Number);
                for (let i = 0; i < Math.max(va.length, vb.length); i++) {
                  const a = va[i] || 0;
                  const b = vb[i] || 0;
                  if (a !== b) return b - a; // descending
                }
                return 0;
              });
            
            let html = \`<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple - Changelog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.7;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #e0e0e0;
    }
    .logo { font-size: 3rem; margin-bottom: 0.5rem; }
    h1 { font-size: 2.5rem; font-weight: 600; letter-spacing: -0.02em; }
    .subtitle { color: #666; margin-top: 0.5rem; font-size: 1.1rem; }
    .warning {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .warning-icon { font-size: 1.5rem; flex-shrink: 0; }
    .warning-text { flex: 1; }
    .warning-text strong { display: block; margin-bottom: 0.5rem; color: #c53030; }
    .warning-text code { background: #fed7d7; padding: 0.15rem 0.4rem; border-radius: 4px; }
    .btn {
      display: inline-block;
      background: #1a1a1a;
      color: white;
      padding: 1rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: background 0.2s, transform 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn:hover { background: #333; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .download-section {
      text-align: center;
      margin: 2rem 0 3rem;
    }
    .version-card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      transition: box-shadow 0.2s;
    }
    .version-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
    .version-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .version-tag {
      background: #1a1a1a;
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1.1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .version-date { color: #888; font-size: 0.9rem; }
    .version-content { color: #333; }
    .version-content h3 { font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: #1a1a1a; }
    .version-content h3:first-child { margin-top: 0; }
    .version-content ul { margin-left: 1.5rem; }
    .version-content li { margin: 0.4rem 0; }
    .version-content code { 
      background: #f5f5f5; 
      padding: 0.15rem 0.4rem; 
      border-radius: 4px; 
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9em;
    }
    .version-content hr { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
    footer {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #eee;
    }
    @media (max-width: 600px) {
      .container { padding: 2rem 1rem; }
      h1 { font-size: 2rem; }
      .version-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class=\"container\">
    <header>
      <div class=\"logo\">💚</div>
      <h1>Simple</h1>
      <p class=\"subtitle\">Changelog — All Versions</p>
    </header>
    
    <div class=\"warning\">
      <span class=\"warning-icon\">⚠</span>
      <div class=\"warning-text\">
        <strong>Important:</strong> Simple is a standalone Windows executable. 
        Download <code>simple.exe</code> below, run it, click <strong>Install</strong>, 
        then open a <strong>new terminal</strong> to use <code>simple</code> commands.
      </div>
    </div>
    
    <div class=\"download-section\">
      <a href=\"simple.exe\" class=\"btn\" download>Download simple.exe</a>
    </div>
    
    <main>
\`;
            
            for (const file of files) {
              const content = fs.readFileSync(path.join(releaseDir, file), 'utf8');
              const version = file.replace('.md', '');
              
              // Extract date from content
              const dateMatch = content.match(/Date:\s*([^\n]+)/i);
              const date = dateMatch ? dateMatch[1].trim() : '';
              
              // Parse sections
              const sections = [];
              const lines = content.split('\n');
              let currentSection = '';
              let currentItems = [];
              
              for (const line of lines) {
                const sectionMatch = line.match(/^##\s+(.+)$/);
                if (sectionMatch) {
                  if (currentSection || currentItems.length) {
                    sections.push({ title: currentSection, items: currentItems });
                  }
                  currentSection = sectionMatch[1];
                  currentItems = [];
                } else if (line.startsWith('- ') || line.startsWith('* ')) {
                  currentItems.push(line.substring(2).trim());
                }
              }
              if (currentSection || currentItems.length) {
                sections.push({ title: currentSection, items: currentItems });
              }
              
              html += \`    <article class=\"version-card\">
      <div class=\"version-header\">
        <span class=\"version-tag\">v\${version}</span>
        <span class=\"version-date\">\${date}</span>
      </div>
      <div class=\"version-content\">\`;
              
              for (const section of sections) {
                if (section.title) {
                  html += \`<h3>\${section.title}</h3>\`;
                }
                if (section.items.length) {
                  html += '<ul>';
                  for (const item of section.items) {
                    // Convert markdown code to HTML
                    const itemHtml = item.replace(/\`([^\`]+)\`/g, '<code>$1</code>');
                    html += \`<li>\${itemHtml}</li>\`;
                  }
                  html += '</ul>';
                }
              }
              
              html += \`      </div>
    </article>\`;
            }
            
            html += \`    </main>
    <footer>
      <p>Simple Programming Language • <a href=\"https://github.com/elijahshepherd/Simple\" style=\"color: #888;\">GitHub</a></p>
    </footer>
  </div>
</body>
</html>\`;
            
            fs.writeFileSync('public/index.html', html);
          "
          
          # Copy the executable
          cp dist-binaries/simple.exe public/simple.exe
          
          # Create .nojekyll
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
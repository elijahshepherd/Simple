name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows Executable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build Windows executable with pkg
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --output simple.exe

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-windows
          path: simple.exe
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download executable
        uses: actions/download-artifact@v4
        with:
          name: simple-windows
          path: ./public

      - name: Create index.html for download page
        run: |
          cat > ./public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Simple Programming Language - Download</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
              .download-btn { display: inline-block; background: #0078d4; color: white; padding: 15px 30px; border-radius: 5px; text-decoration: none; font-size: 18px; font-weight: bold; }
              .download-btn:hover { background: #106ebe; }
              .info { margin-top: 30px; padding: 20px; background: #f5f5f5; border-radius: 5px; }
              code { background: #eee; padding: 2px 6px; border-radius: 3px; }
            </style>
          </head>
          <body>
            <h1>Simple Programming Language</h1>
            <p>Version 1.5.0 - Beginner-friendly programming language with natural English syntax</p>
            
            <a href="simple.exe" class="download-btn" download>Download simple.exe for Windows</a>
            
            <div class="info">
              <h3>Installation</h3>
              <ol>
                <li>Download <code>simple.exe</code> above</li>
                <li>Run it - a welcome screen will appear</li>
                <li>Click "Install" to add to PATH and create Start Menu shortcuts</li>
                <li>Open a <b>new terminal</b> and run <code>simple run-example hello</code></li>
              </ol>
              <p><strong>No Node.js required</strong> - completely standalone executable (~38 MB)</p>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Deploy Changelog Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build Windows executable
        run: |
          npm install -g pkg
          pkg . --targets node18-win-x64 --out-path dist-binaries

      - name: Build changelog site
        run: |
          mkdir -p public
          
          # Generate the changelog site
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            const releaseDir = 'docs/release';
            const files = fs.readdirSync(releaseDir)
              .filter(f => f.endsWith('.md'))
              .sort((a, b) => {
                const va = a.replace('.md', '').split('.').map(Number);
                const vb = b.replace('.md', '').split('.').map(Number);
                for (let i = 0; i < Math.max(va.length, vb.length); i++) {
                  const na = va[i] || 0;
                  const nb = vb[i] || 0;
                  if (na !== nb) return nb - na; // descending
                }
                return 0;
              });
            
            let allVersions = [];
            
            for (const file of files) {
              const content = fs.readFileSync(path.join(releaseDir, file), 'utf8');
              const version = file.replace('.md', '');
              
              // Extract date
              const dateMatch = content.match(/Date:\s*([^\n]+)/i);
              const date = dateMatch ? dateMatch[1].trim() : '';
              
              // Parse sections
              const sections = [];
              const lines = content.split('\n');
              let currentSection = '';
              let currentItems = [];
              
              for (const line of lines) {
                const sectionMatch = line.match(/^##\s+(.+)$/);
                if (sectionMatch) {
                  if (currentSection || currentItems.length) {
                    sections.push({ title: currentSection, items: currentItems });
                  }
                  currentSection = sectionMatch[1];
                  currentItems = [];
                } else if (line.startsWith('- ') || line.startsWith('* ')) {
                  currentItems.push(line.substring(2).trim());
                }
              }
              if (currentSection || currentItems.length) {
                sections.push({ title: currentSection, items: currentItems });
              }
              
              allVersions.push({ version, date, sections });
            }
            
            // Generate HTML
            let html = \`<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple - Changelog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    /* Warning banner */
    .warning {
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 32px;
      text-align: center;
    }
    .warning h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
    .warning p { font-size: 0.95rem; opacity: 0.9; max-width: 600px; margin: 0 auto; }
    .warning a { color: #fff; text-decoration: underline; font-weight: 500; }
    .warning .btn {
      display: inline-block;
      margin-top: 16px;
      background: #fff;
      color: #1a1a1a;
      padding: 12px 28px;
      border-radius: 100px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .warning .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,255,255,0.3); }
    
    header { text-align: center; margin-bottom: 40px; }
    .logo { font-size: 2.5rem; margin-bottom: 8px; }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 1.1rem; font-weight: 400; }
    
    .version-grid { display: flex; flex-direction: column; gap: 16px; }
    .version-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 24px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .version-card:hover { border-color: #d0d0d0; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
    
    .version-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .version-tag {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1.35rem;
      font-weight: 700;
      color: #1a1a1a;
    }
    .version-date { color: #888; font-size: 0.9rem; }
    
    .version-content h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin: 20px 0 8px;
      font-weight: 600;
    }
    .version-content h3:first-child { margin-top: 0; }
    .version-content ul { list-style: none; padding: 0; }
    .version-content li {
      position: relative;
      padding-left: 20px;
      margin: 6px 0;
      color: #333;
      font-size: 0.95rem;
    }
    .version-content li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 6px;
      height: 6px;
      background: #1a1a1a;
      border-radius: 50%;
    }
    .version-content code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    
    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
      color: #888;
      font-size: 0.85rem;
    }
    footer a { color: #888; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    
    @media (max-width: 600px) {
      .container { padding: 24px 16px; }
      h1 { font-size: 1.8rem; }
      .version-tag { font-size: 1.1rem; }
      .version-header { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Warning banner -->
    <div class="warning">
      <h2>⚠️ Important: Standalone Windows Executable</h2>
      <p>Simple is a <strong>standalone Windows executable</strong> that installs itself. No Node.js, Python, or any runtime required.</      <p>Download <code>simple.exe</code>, run it, click <strong>Install</strong>, then open a <strong>new terminal</strong> to use <code>simple</code> commands.</      <a href="simple.exe" class="btn" download>Download simple.exe</a>
    </div>
    
    <header>
      <div class="logo">Simple</div>
      <h1>Changelog</h1>
      <p class="subtitle">All versions and changes</p>
    </header>
    
    <div class="version-grid">\`;
            
            for (const v of allVersions) {
              html += \`    <article class="version-card">
      <div class="version-header">
        <span class="version-tag">v\${v.version}</span>
        <span class="version-date">\${v.date}</span>
      </div>
      <div class="version-content">\`;
              
              for (const section of v.sections) {
                if (section.title) {
                  html += \`<h3>\${section.title}</h3>\`;
                }
                if (section.items.length) {
                  html += '<ul>';
                  for (const item of section.items) {
                    const itemHtml = item.replace(/\`([^\`]+)\`/g, '<code>$1</code>');
                    html += \`<li>\${itemHtml}</li>\`;
                  }
                  html += '</ul>';
                }
              }
              
              html += \`      </div>
    </article>\`;
            }
            
            html += \`    </div>
    <footer>
      <p>Simple Programming Language · <a href="https://github.com/elijahshepherd/Simple" target="_blank" rel="noopener">GitHub</a> · <a href="https://github.com/elijahshepherd/Simple/issues" target="_blank" rel="noopener">Issues</a></p>
    </footer>
  </div>
</body>
</html>\`;
            
            fs.writeFileSync('public/index.html', html);
          "
          
          # Copy the executable
          cp dist-binaries/simple.exe public/simple.exe
          
          # Create .nojekyll
          touch public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4